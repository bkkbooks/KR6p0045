front:
  text: 念佛鏡序無為子楊傑述愛不重不生娑婆念不一不生極樂娑婆穢土也極樂淨土也娑婆之壽則有量彼土之壽則無量矣娑婆備諸苦彼土則安養無苦矣娑婆隨業轉輪生死彼土一往則永證無生法忍若願度生則任意自在不為諸業轉矣其淨穢壽量苦樂生死如是差別而眾生冥然不知可不哀哉阿彌陀佛淨土攝受之主也釋迦如來指導淨土之師也觀音勢至助佛揚化者也是以如來一代教典處處丁寧勸往生也阿彌陀佛與觀音勢至乘大願船泛生死海不著此岸不留彼岸不止中流唯以濟度為佛事是故阿彌陀經云若有善男子善女人聞說阿彌陀佛執持名號若一日乃至七日一心不亂其人臨命終時阿彌陀佛與諸聖眾現在其前是人終時心不顛倒即得往生極樂國土又經云十方眾生聞我名號憶念我國植諸德本至心迴向欲生我國不果遂者不取正覺所以祇洹精舍無常院令病者面西作往生淨土想蓋彌陀光明遍照法界念佛眾生攝取不捨聖凡一體機感相應諸佛心內眾生塵塵極樂眾生心中淨土念念彌陀吾以是觀之智慧者易生能斷疑故禪定者易生不散亂故持戒者易生遠諸染故布施者易生不我有故忍辱者易生不瞋恚故精進者易生不退轉故不造善不作惡者易生念純一故諸惡已作業報已現者易生實慚懼故雖有眾善若無誠信心無深心無迴向發願心者則不得上上品生矣噫彌陀甚易持淨土甚易往眾生不能持不能往佛如眾生何夫造惡業入苦趣念彌陀生極樂二者皆佛言也世人憂墮地獄而疑往生者不亦惑哉晉慧遠法師與當時高士劉遺民等結白蓮社於廬山蓋致精誠於此爾其後七百年僧俗修持獲感者非一咸見于淨土傳記豈誣也哉然讚輔彌陀教觀者其書山積唯善道大師念佛鏡十一門最為首冠援引聖言開決群惑萬年闇室日至而頓有餘光千里水程舟具而不勞自力非法藏後身不能至於是也傑頃於都下甞獲斯文讀示所知無不生信自遭酷罰感窹益深將廣其傳因為敘引熙寧九年丙辰仲秋述大明朝雲棲寺蓮池大師竹窓二筆曰道鏡善道二師作念佛鏡以念佛與種種法門對舉皆斷之曰欲比念佛功德百千萬億分不能及一可謂篤信明辨大有功於淨土矣獨其對禪宗一章謂觀心者觀無生者亦比念佛功德百千萬億分不能及一學人疑焉予以為正四料簡所謂有禪無淨土者是也但執觀心不信有極樂淨土但執無生不信有淨土往生則未達即心即土不知生即無生偏空之見非圓頓之禪也反不如理性雖未大明而念佛已成三昧者何足怪乎若夫觀心而妙悟自心觀無生而得無生忍此正與念佛人上品上生者同科又誰軒輊之有矣古本曰五代十國之契丹道宗年號當于大宋四主仁宗嘉祐第四清寧五稔歲次己亥孟秋月蓂生一葉記奉聖州彰義寺前東五臺臨壇大德弘律沙門法廣詳勘崇攝大夫撿挍太保圓教大師賜紫沙門知昭詳勘夫念佛三昧如明鏡照萬象八萬四千其猶影像三乘五乘從是得入諒是海藏之至要趣道之妙門如守母以識子得本而知末提綱而孔孔皆動牽衣而縷縷俱來矣所以華嚴譬如以獅子筋為琴絃音聲一奏一切餘絃悉皆斷壞矣世有一般師輕蔑彌陀偏勸菩薩令持陀羅尼修禪定是錯之甚者乎西方之外別無觀音之土九品來應悉擎蓮臺形像妙觀說是心是佛是故百丈智覺等皆開張淨土均勸念佛言積于萬卷書滿于海內特可備於輕蔑者之金錍者其惟二師之念佛鏡乎門分十一導於萬機疑立二三蕩於群惑可謂澆世念佛之寶鏡四輩安神之華屋者也繇茲雲棲大師深服膺斯書歎篤信明解大有功於淨土甞無駁言而還彰偏見過失矣古梓誵訛是多今獲國歡寺本專隨之正之但疑楊傑序轉用之冀祈同志之仁講再挍本傳之無窮之里俱入薩雲之海而已旹延寶元龍集癸丑臘月上浣江東住侶大谷門人某誌焉
